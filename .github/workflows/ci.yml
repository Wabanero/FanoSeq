name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,downstream]"

      - name: Ruff
        run: python -m ruff check .

      - name: Full-package MyPy
        run: python -m mypy src/fanoseq

      - name: Pytest
        run: python -m pytest

      - name: Top-level CLI help
        run: fanoseq --help

      - name: Build source distribution and wheel
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

  integration:
    name: Scientific workflow and packaging smoke tests
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,downstream]"

      - name: Coverage threshold
        run: >
          python -m pytest --cov=fanoseq --cov-report=term-missing
          --cov-report=xml --cov-fail-under=60

      - name: Every CLI help page
        shell: bash
        run: |
          for command in run analyze prepare-homology-groups list-encodings list-axis-schemes list-axis-definitions \
            describe-axis-scheme validate-axis-schemes audit-encoding fano-plane \
            plot-fano-plane fano-features fano-stability validate-basis baselines benchmark \
            matrix-genetics codon-embedding-init octonion-walk export-tensor distances \
            plot-multipanel fano-triads; do
            fanoseq "$command" --help >/dev/null
          done

      - name: Algebra and axis validation smoke tests
        run: |
          fanoseq validate-basis
          fanoseq validate-axis-schemes

      - name: Deterministic benchmark smoke test
        run: fanoseq benchmark --config examples/benchmark.yaml --output-dir ci_benchmark

      - name: Encoding-audit smoke test
        run: >
          fanoseq audit-encoding --input examples/benchmark_sequences.fasta
          --seq-type dna --checks contracts,reverse-complement
          --window-size 9 --step 3 --kmer-k 2 --permutation-samples 1
          --max-perturbations 4 --no-plots --output-dir ci_audit

      - name: Complete-analysis smoke test
        run: >
          fanoseq analyze --input examples/benchmark_sequences.fasta
          --benchmark-config examples/benchmark.yaml --output-dir ci_analysis
          --audit-permutation-samples 1 --audit-max-perturbations 8

      - name: Build and validate source distribution and wheel
        run: |
          python -m build
          python -m twine check dist/*

      - name: Install and smoke-test wheel
        shell: bash
        run: |
          python -m pip uninstall -y fanoseq
          python -m pip install --no-index --find-links dist fanoseq
          fanoseq --help

      - name: Install and smoke-test source distribution
        shell: bash
        run: |
          python -m pip uninstall -y fanoseq
          python -m pip install --no-cache-dir --no-build-isolation dist/*.tar.gz
          fanoseq validate-basis
