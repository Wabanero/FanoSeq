name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install ".[dev,downstream]"

      - name: Ruff
        run: python -m ruff check .

      - name: MyPy
        run: >
          python -m mypy --follow-imports=silent
          src/fanoseq/benchmark/config.py
          src/fanoseq/benchmark/datasets.py
          src/fanoseq/benchmark/feature_sets.py

      - name: Pytest
        run: python -m pytest

      - name: CLI smoke tests
        run: |
          fanoseq validate-basis
          fanoseq list-encodings
          fanoseq list-axis-schemes

      - name: Deterministic benchmark smoke test
        run: fanoseq benchmark --config examples/benchmark.yaml --output-dir ci_benchmark

      - name: Build package
        run: python -m build

      - name: Install from built wheel
        shell: bash
        run: |
          python -m pip uninstall -y fanoseq
          python -m pip install --no-index --find-links dist fanoseq
          fanoseq --help
